<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תמלול IVRIT.AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      margin: 0;
      padding: 2rem 1rem;
      background: #f0f2f5;
      box-sizing: border-box;
    }
    .card {
      background: white;
      padding: 2rem 3rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 600px;
      text-align: center;
    }
    h1 { color: #333; margin-bottom: 1.5rem; }
    input[type="file"] {
      display: block;
      margin: 0 auto 1rem;
      font-size: 1rem;
    }
    .btn-primary {
      background: #2563eb;
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
    }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
    .btn-download {
      background: #16a34a;
      color: white;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      margin-top: 0.5rem;
      margin-right: 0.5rem;
    }
    #status { margin-top: 1rem; color: #666; font-size: 0.9rem; }
    .result-block {
      margin-top: 1.5rem;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      overflow: hidden;
      display: none;
    }
    .result-header {
      background: #f1f5f9;
      padding: 0.75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .result-header h3 { margin: 0; color: #555; font-size: 0.9rem; }
    .result-header .arrow { font-size: 0.75rem; color: #888; }
    .result-body {
      background: #f8fafc;
      padding: 1rem;
      text-align: right;
      display: none;
    }
    .result-body pre {
      margin: 0;
      font-size: 1rem;
      line-height: 1.6;
      white-space: pre-wrap;
      font-family: Arial, sans-serif;
    }
    .downloads { margin-top: 0.75rem; text-align: left; }
  </style>
</head>
<body>
  <div class="card">
    <h1>תמלול עברית</h1>
    <input type="file" id="audioFile" accept="audio/*,video/*,.mp3,.m4a,.wav,.aac,.ogg,.flac,.opus,.wma,.mp4,.mov,.avi,.mkv,.webm">
    <button class="btn-primary" id="btn" onclick="transcribe()">תמלל</button>
    <div id="status"></div>

    <div class="result-block" id="textBlock">
      <div class="result-header" onclick="toggle('textBody', 'textArrow')">
        <h3>טקסט</h3>
        <span class="arrow" id="textArrow">▼</span>
      </div>
      <div class="result-body" id="textBody">
        <pre id="textResult"></pre>
        <div class="downloads">
          <button class="btn-download" onclick="download('text')">הורד TXT</button>
        </div>
      </div>
    </div>

    <div class="result-block" id="srtBlock">
      <div class="result-header" onclick="toggle('srtBody', 'srtArrow')">
        <h3>כתוביות SRT</h3>
        <span class="arrow" id="srtArrow">▼</span>
      </div>
      <div class="result-body" id="srtBody">
        <pre id="srtResult"></pre>
        <div class="downloads">
          <button class="btn-download" onclick="download('srt')">הורד SRT</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let lastData = {};

    async function transcribe() {
      const file = document.getElementById('audioFile').files[0];
      if (!file) { alert('בחר קובץ אודיו'); return; }

      const btn = document.getElementById('btn');
      const status = document.getElementById('status');
      document.getElementById('textBlock').style.display = 'none';
      document.getElementById('srtBlock').style.display = 'none';

      btn.disabled = true;
      status.textContent = 'מעלה קובץ...';

      const form = new FormData();
      form.append('audio', file);

      try {
        const res = await fetch('/transcribe', { method: 'POST', body: form });
        const data = await res.json();
        if (!res.ok || data.error) {
          status.textContent = 'שגיאה: ' + JSON.stringify(data.error ?? data);
          return;
        }

        const { jobId } = data;
        status.textContent = 'מתמלל...';
        await pollStatus(jobId);
      } catch (e) {
        status.textContent = 'שגיאת רשת: ' + e.message;
      } finally {
        btn.disabled = false;
      }
    }

    async function pollStatus(jobId) {
      const status = document.getElementById('status');
      let dots = 0;

      while (true) {
        await new Promise(r => setTimeout(r, 3000));
        dots = (dots + 1) % 4;
        status.textContent = 'מתמלל' + '.'.repeat(dots + 1);

        try {
          const res = await fetch('/status/' + jobId);
          const data = await res.json();

          if (!res.ok || data.error) {
            status.textContent = 'שגיאה: ' + JSON.stringify(data.error ?? data);
            return;
          }

          if (data.status === 'COMPLETED') {
            lastData = data;
            document.getElementById('textResult').textContent = data.text;
            document.getElementById('textBlock').style.display = 'block';
            if (data.srt) {
              document.getElementById('srtResult').textContent = data.srt;
              document.getElementById('srtBlock').style.display = 'block';
            }
            status.textContent = '';
            return;
          }
        } catch (e) {
          status.textContent = 'שגיאת רשת: ' + e.message;
          return;
        }
      }
    }

    function toggle(bodyId, arrowId) {
      const body = document.getElementById(bodyId);
      const arrow = document.getElementById(arrowId);
      const open = body.style.display === 'block';
      body.style.display = open ? 'none' : 'block';
      arrow.textContent = open ? '▼' : '▲';
    }

    function download(type) {
      const content = type === 'srt' ? lastData.srt : lastData.text;
      const ext = type === 'srt' ? 'srt' : 'txt';
      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `transcription.${ext}`;
      a.click();
    }
  </script>
</body>
</html>
