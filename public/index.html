<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תמלול IVRIT.AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      margin: 0;
      padding: 2rem 1rem;
      background: #f0f2f5;
      box-sizing: border-box;
    }
    .card {
      background: white;
      padding: 2rem 3rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 960px;
      text-align: center;
    }
    h1 { color: #333; margin-bottom: 1.5rem; }
    input[type="file"] {
      display: block;
      margin: 0 auto 1rem;
      font-size: 1rem;
    }
    .btn-primary {
      background: #2563eb;
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
    }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
    .btn-download {
      background: #16a34a;
      color: white;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      margin-top: 0.5rem;
      margin-right: 0.5rem;
    }
    #status { margin-top: 1rem; color: #666; font-size: 0.9rem; }
    .divider { border: none; border-top: 1px solid #e2e8f0; margin: 2rem 0; }
    textarea {
      width: 100%;
      min-height: 100px;
      padding: 0.75rem;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      font-family: Arial, sans-serif;
      resize: vertical;
      box-sizing: border-box;
      margin-bottom: 0.75rem;
    }
    .verse-card {
      background: white;
      border: 1px solid #ddd6fe;
      transition: background 0.2s, border-color 0.2s;
      border-radius: 8px;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      text-align: right;
    }
    .verse-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.4rem;
    }
    .verse-name { font-weight: bold; color: #5b21b6; font-size: 1rem; }
    .verse-time { font-size: 0.85rem; color: #888; font-family: monospace; direction: ltr; }
    .verse-srt { font-size: 0.85rem; color: #555; margin-bottom: 0.25rem; line-height: 1.4; }
    .verse-original { font-size: 0.9rem; color: #333; line-height: 1.5; }
    .verse-label { font-weight: bold; color: #999; margin-left: 0.3rem; }
    .verse-card.active {
      background: #fff3cd;
      border-color: #f5a623;
      border-width: 2px;
    }
    .verse-missing {
      color: #92400e;
      padding: 0.4rem 0.75rem;
      background: #fef3c7;
      border-radius: 6px;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      text-align: right;
    }
    .verse-status { margin-top: 0.75rem; font-size: 1rem; font-weight: bold; text-align: center; }
    #srtPlayer { width: 100%; margin-bottom: 0; }
    #stickyPlayer {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: #fff;
      padding: 0.4rem 1rem;
      border-bottom: 1px solid #e2e8f0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: none;
    }
    #recentAudioSection { margin-top: 0.5rem; }
    #recentAudioSection h4 { font-size: 0.85rem; color: #888; margin: 0 0 0.3rem; text-align: right; }
    .recent-audio-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.35rem 0.6rem; border-radius: 6px; cursor: pointer;
      font-size: 0.88rem; border: 1px solid #e2e8f0; margin-bottom: 3px;
      background: #f8fafc; transition: background 0.15s;
    }
    .recent-audio-item:hover { background: #e0e7ff; }
    .recent-audio-item.active { background: #dbeafe; border-color: #93c5fd; font-weight: bold; }
    .recent-audio-name { direction: ltr; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 75%; }
    .recent-audio-date { font-size: 0.78rem; color: #aaa; flex-shrink: 0; }
    .recent-audio-remove { font-size: 0.75rem; color: #ccc; cursor: pointer; padding: 0 0.2rem; margin-right: 0.3rem; }
    .recent-audio-remove:hover { color: #ef4444; }
    .srt-time {
      font-size: 0.75rem;
      color: #aaa;
      font-family: monospace;
      direction: ltr;
      display: inline-block;
      margin-left: 0.5rem;
    }
    .parallel-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      direction: rtl;
    }
    .parallel-seg {
      padding: 0.5rem 0.75rem;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 0.9rem;
      line-height: 1.5;
      transition: background 0.15s;
    }
    .parallel-seg.active { background: #fff3cd; border-color: #f5a623; border-width: 2px; }
    .parallel-verse-cell { min-height: 1px; }
    .topics-toc {
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      text-align: right;
    }
    .topics-toc-title {
      font-weight: bold;
      color: #166534;
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
    }
    .topic-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.3rem 0.5rem;
      border-radius: 5px;
      font-size: 0.88rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .topic-item:hover { background: #dcfce7; }
    .topic-item-title { color: #1e293b; }
    .topic-item-time { font-family: monospace; font-size: 0.8rem; color: #888; direction: ltr; }
    .topic-divider {
      grid-column: 1 / -1;
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      font-weight: bold;
      color: #166534;
      font-size: 0.9rem;
      margin: 0.25rem 0;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .topic-divider:hover { background: #dcfce7; }
    .topic-divider.active {
      background: #bbf7d0;
      border-color: #16a34a;
      border-width: 2px;
    }
    #userView {
      display: none;
      position: fixed;
      top: 60px; left: 0; right: 0; bottom: 0;
      z-index: 90;
      background: #f0f2f5;
      flex-direction: column;
      box-sizing: border-box;
      --uv-num-col: 2.8rem;
      --uv-num-slot: 1.2rem;
      --uv-row-spacer-col: 0.5rem;
    }
    #viewToggleFab {
      position: fixed;
      top: 68px;
      right: 16px;
      z-index: 200;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: #0891b2;
      color: #fff;
      font-size: 1.3rem;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    #viewToggleFab:disabled { background: #94a3b8; cursor: not-allowed; box-shadow: none; }
    #viewToggleFab:hover:not(:disabled) { background: #0e7490; }
    #captionToggleBtn {
      position: fixed;
      top: 68px;
      right: 68px;
      z-index: 200;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: #0891b2;
      color: #fff;
      font-size: 1.2rem;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    #captionToggleBtn.uv-off { background: #94a3b8; }
    #userViewTitle {
      flex-shrink: 0;
      height: 6.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 68px;
      box-sizing: border-box;
      font-size: 1.05rem;
      font-weight: 600;
      color: #334155;
      text-align: center;
    }
    #userViewVerses {
      flex: 1 1 auto;
      position: relative;
      overflow: hidden;
      max-width: 720px; width: 100%;
      margin: 0 auto; box-sizing: border-box;
    }
    #uvTrack {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 0 0.8rem; box-sizing: border-box;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }
    .uv-row {
      position: relative;
      display: flex;
      align-items: flex-start;
      line-height: 1.7;
      font-size: 1.3rem;
      color: #333;
      opacity: 0.35;
      cursor: pointer;
      padding: 0.5rem 0 0.75rem;
      transition: opacity 0.3s ease, color 0.3s ease;
    }
    .uv-row:hover { opacity: 0.55; }
    .uv-row.uv-active {
      opacity: 1;
      color: #1e293b;
      font-weight: bold;
      cursor: default;
    }
    .uv-row.uv-active:hover { opacity: 1; }
    .uv-row.uv-hidden-hist { opacity: 0; pointer-events: none; }
    .uv-num-badge {
      flex: 0 0 var(--uv-num-col);
      height: calc(1.3rem * 1.7);
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 0.1rem;
      white-space: nowrap;
    }
    .uv-row-text {
      flex: 1 1 0%;
      min-width: 0;
      text-align: center;
    }
    .uv-row-spacer {
      flex: 0 0 var(--uv-row-spacer-col);
    }
    .uv-verse-num {
      flex: 0 0 var(--uv-num-slot);
      text-align: right;
      font-size: 0.8rem;
      color: #999;
      pointer-events: none;
      user-select: none;
    }
    .uv-row.uv-active .uv-verse-num { color: #64748b; font-weight: 600; }
    .uv-chapter-num {
      flex: 0 0 var(--uv-num-slot);
      text-align: center;
      font-size: 0.8rem;
      color: #64748b;
      font-weight: 600;
      pointer-events: none;
      user-select: none;
    }
    .uv-meter {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 3px;
      border-radius: 2px;
      background: rgba(0,0,0,0.08);
      overflow: hidden;
      display: none;
    }
    .uv-meter-fill {
      width: 100%;
      height: 100%;
      background: #f5a623;
      transform-origin: right center;
      transform: scaleX(0);
      will-change: transform;
    }
    #userViewCaption {
      flex-shrink: 0; height: 5.5rem; overflow-y: auto;
      background: #111827; color: #fff; font-size: 1.3rem; line-height: 1.5;
      text-align: center; padding: 0.5rem 1.5rem; box-sizing: border-box;
      display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>
  <div id="stickyPlayer"><audio id="srtPlayer" controls style="width:100%;"></audio></div>
  <button id="viewToggleFab" disabled onclick="toggleUserView()" title="החלף תצוגה">📖</button>
  <button id="captionToggleBtn" class="uv-off" onclick="toggleCaptions()" title="הצג כתוביות">💬</button>
  <div class="card">
    <h1>תמלול עברית</h1>
    <input type="file" id="audioFile" accept="audio/*,video/*,.mp3,.m4a,.wav,.aac,.ogg,.flac,.opus,.wma,.mp4,.mov,.avi,.mkv,.webm">
    <div id="recentAudioSection" style="display:none;">
      <div id="recentAudioList"></div>
    </div>
    <button class="btn-primary" id="btn" onclick="transcribe()">תמלל</button>
    <div id="status"></div>

    <div style="margin-top:1rem;margin-bottom:1rem;text-align:right;display:flex;flex-wrap:wrap;gap:0.5rem;align-items:center;">
      <button class="btn-download" id="parallelVersesBtn" onclick="findVersesParallel()" style="background:#7c3aed;">זיהוי פסוקים</button>
      <label style="display:flex;align-items:center;gap:0.3rem;font-size:0.85rem;color:#555;cursor:pointer;user-select:none;">
        <input type="checkbox" id="includeTopics" style="cursor:pointer;"> כלול נושאים
      </label>
      <label style="display:flex;align-items:center;gap:0.3rem;font-size:0.85rem;color:#555;user-select:none;">
        פסוקים קודמים בתצוגת משתמש:
        <select id="prevVersesSelect" onchange="setPrevVersesCount(this.value)" style="padding:0.2rem 0.4rem;border-radius:4px;border:1px solid #ccc;cursor:pointer;">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
        </select>
      </label>
      <label style="display:flex;align-items:center;gap:0.3rem;font-size:0.85rem;color:#555;cursor:pointer;user-select:none;">
        <input type="checkbox" id="showMeterCheckbox" checked onchange="setShowMeter(this.checked)" style="cursor:pointer;"> הצג מד התקדמות בתצוגת משתמש
      </label>
      <label style="display:flex;align-items:center;gap:0.3rem;font-size:0.85rem;color:#555;user-select:none;">
        מיקום מד ההתקדמות:
        <select id="meterPositionSelect" onchange="setMeterPosition(this.value)" style="padding:0.2rem 0.4rem;border-radius:4px;border:1px solid #ccc;cursor:pointer;">
          <option value="current">מתחת לפסוק הנוכחי (סוף הפסוק)</option>
          <option value="next">מתחת לפסוק הבא (תחילת הפסוק הבא)</option>
        </select>
      </label>
      <label style="display:flex;align-items:center;gap:0.3rem;font-size:0.85rem;color:#555;cursor:pointer;user-select:none;">
        <input type="checkbox" id="pauseBeforeVerseCheckbox" onchange="setPauseBeforeVerse(this.checked)" style="cursor:pointer;"> עצור מעט אחרי שכל פסוק מתחיל (תצוגת משתמש)
      </label>
      <span id="parallelStatus" style="font-size:0.85rem;color:#888;"></span>
    </div>
    <div id="parallelResult"></div>

    <div style="margin-top:0.75rem;text-align:right;">
      <button class="btn-download" style="background:#64748b;" onclick="toggleManualSrtParallel()">הדבק SRT ידנית</button>
      <div id="manualSrtAreaParallel" style="display:none;margin-top:0.5rem;">
        <div style="margin-bottom:0.4rem;text-align:left;">
          <input type="file" id="manualSrtFileParallel" accept=".srt,text/plain" style="font-size:0.85rem;">
        </div>
        <textarea id="manualSrtInputParallel" placeholder="הדבק כאן SRT..." style="width:100%;min-height:120px;padding:0.5rem;border:1px solid #e2e8f0;border-radius:6px;font-size:0.85rem;font-family:monospace;direction:ltr;resize:vertical;box-sizing:border-box;"></textarea>
        <button class="btn-primary" style="margin-top:0.4rem;" onclick="loadManualSrtParallel()">טען SRT</button>
      </div>
    </div>

    <hr class="divider">
    <h2 style="color:#333;margin-bottom:1rem;">זיהוי פסוקים ברצף</h2>
    <textarea id="manualInputParallel" placeholder="הדבק כאן טקסט או SRT לזיהוי פסוקים ברצף..."></textarea>
    <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
      <button class="btn-primary" id="manualVersesBtnParallel" onclick="findVersesManualParallel()" style="background:#7c3aed;">זיהוי פסוקים ברצף</button>
      <label style="display:flex;align-items:center;gap:0.3rem;font-size:0.85rem;color:#555;cursor:pointer;user-select:none;">
        <input type="checkbox" id="includeTopicsManual" style="cursor:pointer;"> כלול נושאים
      </label>
    </div>
    <div id="manualVersesResultParallel" style="display:none;margin-top:1rem;"></div>

    <div style="margin-top:0.75rem;text-align:right;display:flex;flex-wrap:wrap;gap:0.5rem;justify-content:flex-end;">
      <button class="btn-download" style="background:#64748b;" onclick="toggleManualVersesParallel()">הדבק מיפוי פסוקים ידנית</button>
      <button id="btnClearCurrent" class="btn-download" style="background:#dc2626;display:none;" onclick="clearCurrentCache()">נקה קאש לקובץ זה</button>
      <button id="btnClearAll" class="btn-download" style="background:#7f1d1d;display:none;" onclick="clearAllCache()">נקה כל הקאש</button>
      <div id="manualVersesAreaParallel" style="display:none;margin-top:0.5rem;width:100%;">
        <div style="margin-bottom:0.4rem;text-align:left;">
          <input type="file" id="manualVersesFileParallel" accept=".json,.srt,text/plain" style="font-size:0.85rem;">
        </div>
        <textarea id="manualVersesInputParallel" placeholder='הדבק כאן JSON של מיפוי פסוקים...' style="width:100%;min-height:120px;padding:0.5rem;border:1px solid #e2e8f0;border-radius:6px;font-size:0.85rem;font-family:monospace;direction:ltr;resize:vertical;box-sizing:border-box;"></textarea>
        <button class="btn-primary" style="margin-top:0.4rem;" onclick="loadManualVersesParallel()">טען מיפוי</button>
      </div>
    </div>
  </div>

  <div id="userView">
    <div id="userViewTitle"></div>
    <div id="userViewVerses">
      <div id="uvTrack"></div>
    </div>
    <div id="userViewCaption" style="display:none;"></div>
  </div>

  <script>
    let lastData = {};
    let lastVersesData = [];
    let lastTopicsData = [];
    let selectedAudioFile = null;
    let srtSegments = [];
    let userViewActive = false;
    let lastCaptionSegId = null;
    let uvVerses = [];
    let uvCurrentIdx = null; // null = not yet rendered; forces an initial render even if idx computes to -1
    let uvGestureCooldown = false;
    let uvTouchStartY = null;
    let uvRowEls = [];
    let uvRowChapterEls = [];
    let uvRowCenters = [];
    let uvMeterRowIdx = null;
    let uvChapterBadgeIdx = null;
    let captionsVisible = false;
    let prevVersesCount = parseInt(localStorage.getItem('uvPrevVersesCount') || '1', 10);
    document.getElementById('prevVersesSelect').value = String(prevVersesCount);
    let showMeter = localStorage.getItem('uvShowMeter') !== 'false';
    document.getElementById('showMeterCheckbox').checked = showMeter;
    let meterPosition = localStorage.getItem('uvMeterPosition') === 'current' ? 'current' : 'next';
    document.getElementById('meterPositionSelect').value = meterPosition;
    let pauseBeforeVerse = localStorage.getItem('uvPauseBeforeVerse') === 'true';
    document.getElementById('pauseBeforeVerseCheckbox').checked = pauseBeforeVerse;
    let uvPauseHandledIdx = null;
    applyMeterVisibility();
    updateCacheButtons();

    function applyMeterVisibility() {
      if (uvMeterRowIdx !== null && uvRowEls[uvMeterRowIdx]) {
        const old = uvRowEls[uvMeterRowIdx].querySelector('.uv-meter');
        if (old) old.style.display = 'none';
      }
      uvMeterRowIdx = null;
      if (!showMeter || uvCurrentIdx === null) return;
      const targetIdx = meterPosition === 'next' ? uvCurrentIdx + 1 : uvCurrentIdx;
      const row = uvRowEls[targetIdx];
      if (!row) return;
      const meterEl = row.querySelector('.uv-meter');
      if (!meterEl) return;
      meterEl.style.display = 'block';
      uvMeterRowIdx = targetIdx;
    }

    function setPrevVersesCount(n) {
      prevVersesCount = parseInt(n, 10);
      localStorage.setItem('uvPrevVersesCount', String(prevVersesCount));
      if (userViewActive) renderUvActive();
    }

    function setShowMeter(checked) {
      showMeter = checked;
      localStorage.setItem('uvShowMeter', String(checked));
      applyMeterVisibility();
      if (userViewActive) {
        if (checked) startUvMeterLoop(); else stopUvMeterLoop();
      }
    }

    function setPauseBeforeVerse(checked) {
      pauseBeforeVerse = checked;
      localStorage.setItem('uvPauseBeforeVerse', String(checked));
      uvPauseHandledIdx = null;
    }

    function setMeterPosition(value) {
      meterPosition = value === 'next' ? 'next' : 'current';
      localStorage.setItem('uvMeterPosition', meterPosition);
      applyMeterVisibility();
    }

    document.getElementById('audioFile').addEventListener('change', async function () {
      const file = this.files[0];
      if (!file) return;
      await saveAudioToDb(file);
      updateRecentAudioList(file);
      applyAudioFile(file);
    });

    // IndexedDB helpers
    function openAudioDb() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open('ivritAudioCache', 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore('audioFiles');
        req.onsuccess = e => resolve(e.target.result);
        req.onerror = e => reject(e.target.error);
      });
    }
    async function saveAudioToDb(file) {
      const db = await openAudioDb();
      const key = `${file.name}_${file.size}`;
      return new Promise((resolve, reject) => {
        const tx = db.transaction('audioFiles', 'readwrite');
        tx.objectStore('audioFiles').put(file, key);
        tx.oncomplete = () => resolve(key);
        tx.onerror = e => reject(e.target.error);
      });
    }
    async function loadAudioFromDb(key) {
      const db = await openAudioDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('audioFiles', 'readonly');
        const req = tx.objectStore('audioFiles').get(key);
        req.onsuccess = e => resolve(e.target.result || null);
        req.onerror = e => reject(e.target.error);
      });
    }
    async function deleteAudioFromDb(key) {
      const db = await openAudioDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('audioFiles', 'readwrite');
        tx.objectStore('audioFiles').delete(key);
        tx.oncomplete = () => resolve();
        tx.onerror = e => reject(e.target.error);
      });
    }

    // Recent audio list
    const MAX_RECENT_AUDIO = 10;
    function getRecentAudioList() {
      return JSON.parse(localStorage.getItem('recentAudioList') || '[]');
    }
    function updateRecentAudioList(file) {
      const key = `${file.name}_${file.size}`;
      let list = getRecentAudioList().filter(i => i.key !== key);
      list.unshift({ key, name: file.name, size: file.size, ts: Date.now() });
      if (list.length > MAX_RECENT_AUDIO) list = list.slice(0, MAX_RECENT_AUDIO);
      localStorage.setItem('recentAudioList', JSON.stringify(list));
      localStorage.setItem('lastAudioKey', key);
      renderRecentAudioList();
    }
    function renderRecentAudioList() {
      const list = getRecentAudioList();
      const section = document.getElementById('recentAudioSection');
      const container = document.getElementById('recentAudioList');
      if (!list.length) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      const activeKey = selectedAudioFile ? `${selectedAudioFile.name}_${selectedAudioFile.size}` : '';
      container.innerHTML = list.map(item =>
        `<div class="recent-audio-item${item.key === activeKey ? ' active' : ''}">
          <span class="recent-audio-name" onclick="loadRecentAudio('${item.key}')">${escHtml(item.name)}</span>
          <span style="display:flex;align-items:center;gap:0.4rem;">
            <span class="recent-audio-date">${new Date(item.ts).toLocaleDateString('he-IL')}</span>
            <span class="recent-audio-remove" onclick="removeRecentAudio('${item.key}')" title="הסר">✕</span>
          </span>
        </div>`
      ).join('');
    }
    async function loadRecentAudio(key) {
      const file = await loadAudioFromDb(key);
      if (!file) {
        const list = getRecentAudioList().filter(i => i.key !== key);
        localStorage.setItem('recentAudioList', JSON.stringify(list));
        renderRecentAudioList();
        return;
      }
      localStorage.setItem('lastAudioKey', key);
      applyAudioFile(file);
    }
    async function removeRecentAudio(key) {
      await deleteAudioFromDb(key);
      const list = getRecentAudioList().filter(i => i.key !== key);
      localStorage.setItem('recentAudioList', JSON.stringify(list));
      if (localStorage.getItem('lastAudioKey') === key) localStorage.removeItem('lastAudioKey');
      renderRecentAudioList();
    }

    function clearDisplayedContent() {

    function applyAudioFile(file) {

    async function bootstrapFromLecture(slug) {
      try {
        const res = await fetch(`/lecture/${slug}/data.json`);
        if (!res.ok) {
          document.getElementById('status').textContent = 'השיעור לא נמצא';
          return;
        }
        const data = await res.json();
        clearDisplayedContent();
        lastData.srt = data.srt;
        lastData.title = data.title || '';
        document.getElementById('userViewTitle').textContent = lastData.title;
        srtSegments = parseSrt(data.srt);

        renderParallelVerses({ verses: data.verses, complete: data.complete, topics: data.topics });
        toggleUserView();
      } catch (e) {
        document.getElementById('status').textContent = 'שגיאת רשת: ' + e.message;
      }
    }

    function numToHebrew(n) {
      if (n === 15) return 'טו';
      if (n === 16) return 'טז';
      const vals = [[400,'ת'],[300,'ש'],[200,'ר'],[100,'ק'],[90,'צ'],[80,'פ'],[70,'ע'],[60,'ס'],[50,'נ'],[40,'מ'],[30,'ל'],[20,'כ'],[10,'י'],[9,'ט'],[8,'ח'],[7,'ז'],[6,'ו'],[5,'ה'],[4,'ד'],[3,'ג'],[2,'ב'],[1,'א']];
      let result = '';
      for (const [val, ch] of vals) { while (n >= val) { result += ch; n -= val; } }
      return result;
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function srtTimeToMs(t) {
      const [h, m, s] = t.split(':').map(Number);
      return (h * 3600 + m * 60 + s) * 1000;
    }

    function msToSrtTime(ms) {
      const h = Math.floor(ms / 3600000);
      const m = Math.floor((ms % 3600000) / 60000);
      const s = Math.floor((ms % 60000) / 1000);
      const ms2 = ms % 1000;
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')},${String(ms2).padStart(3,'0')}`;
    }

    function lastSrtEndTime() {
      const srt = lastData.srt || '';
      const matches = [...srt.matchAll(/\d{2}:\d{2}:\d{2},\d{3} --> (\d{2}:\d{2}:\d{2},\d{3})/g)];
      if (!matches.length) return null;
      const last = matches[matches.length - 1][1];
      const [t, ms] = last.split(',');
      return srtTimeToMs(t) + parseInt(ms);
    }

    function generateVerseSrt(verses) {
      const detected = verses.filter(v => !v.missing && v.startTime);
      if (!detected.length) return '';
      const lastEnd = lastSrtEndTime();
      return detected.map((v, i) => {
        const start = msToSrtTime(srtTimeToMs(v.startTime));
        const end = i < detected.length - 1
          ? msToSrtTime(srtTimeToMs(detected[i + 1].startTime))
          : lastEnd !== null ? msToSrtTime(lastEnd) : msToSrtTime(srtTimeToMs(v.startTime) + 30000);
        return `${i + 1}\n${start} --> ${end}\n${v.verseText || v.verse}`;
      }).join('\n\n');
    }

    function downloadVerseSrt() {
      const srt = generateVerseSrt(lastVersesData);
      if (!srt) return;
      const blob = new Blob([srt], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'verses.srt';
      a.click();
    }

    function generateTopicsSrt(topics) {
      const withTime = topics.filter(t => t.startTime);
      if (!withTime.length) return '';
      const lastEnd = lastSrtEndTime();
      return withTime.map((t, i) => {
        const start = msToSrtTime(srtTimeToMs(t.startTime));
        const end = i < withTime.length - 1
          ? msToSrtTime(srtTimeToMs(withTime[i + 1].startTime))
          : lastEnd !== null ? msToSrtTime(lastEnd) : msToSrtTime(srtTimeToMs(t.startTime) + 300000);
        return `${i + 1}\n${start} --> ${end}\n${t.title}`;
      }).join('\n\n');
    }

    function downloadTopicsSrt() {
      const srt = generateTopicsSrt(lastTopicsData);
      if (!srt) return;
      const blob = new Blob([srt], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'topics.srt';
      a.click();
    }

    function renderVerses(data, container) {
      if (data.error) {
        container.textContent = 'שגיאה: ' + data.error;
        container.style.display = 'block';
        return;
      }
      const { verses = [], complete } = data;
      lastVersesData = verses;
      if (selectedAudioFile && verses.length) {
        const key = `verseMapping_${selectedAudioFile.name}_${selectedAudioFile.size}`;
        localStorage.setItem(key, JSON.stringify(verses));
        if (data.topics?.length) {
          localStorage.setItem(`topicsMapping_${selectedAudioFile.name}_${selectedAudioFile.size}`, JSON.stringify(data.topics));
        }
        updateCacheButtons();
      }
      const detected = verses.filter(v => !v.missing);
      const first = detected[0]?.verse ?? '';
      const last = detected[detected.length - 1]?.verse ?? '';
      const range = first === last ? first : `${first} — ${last}`;
      let html = `<div class="verse-status">${complete ? '✅ הרצף שלם' : '⚠️ יש חורים ברצף'}</div>`;
      if (range) html += `<div style="text-align:right;margin-bottom:0.75rem;font-size:0.9rem;color:#555;">טווח: <strong>${escHtml(range)}</strong></div>`;
      const topicsWithTime = (data.topics || []).filter(t => t.startTime);
      if (data.topics?.length) {
        const hasTopicTimes = topicsWithTime.length > 0;
        html += `<div class="topics-toc">`;
        html += `<div class="topics-toc-title">📋 תוכן עניינים</div>`;
        for (let i = 0; i < data.topics.length; i++) {
          const t = data.topics[i];
          const sec = t.startTime ? srtTimeSec(t.startTime + ',000') : null;
          html += `<div class="topic-item"${sec !== null ? ` data-start="${sec}"` : ''}>`;
          html += `<span class="topic-item-title"><span style="color:#86efac;margin-left:0.4rem;">${i + 1}.</span>${escHtml(t.title)}</span>`;
          if (t.startTime) html += `<span class="topic-item-time">${escHtml(t.startTime)}</span>`;
          html += `</div>`;
        }
        if (hasTopicTimes) {
          html += `<div style="margin-top:0.5rem;text-align:left;"><button class="btn-download" style="background:#166534;" onclick="downloadTopicsSrt()">הורד SRT נושאים</button></div>`;
        }
        html += `</div>`;
      }
      if (detected.some(v => v.startTime)) {
        html += `<div style="text-align:left;margin-bottom:0.75rem;"><button class="btn-download" onclick="downloadVerseSrt()">הורד SRT פסוקים</button></div>`;
      }
      let verseIndex = 0;
      for (const v of verses) {
        if (v.missing) {
          html += `<div class="verse-missing">⚠️ חסר: ${escHtml(v.verse)}${v.verseText ? ` &mdash; <em>${escHtml(v.verseText)}</em>` : ''}</div>`;
        } else {
          verseIndex++;
          html += `<div class="verse-card"${v.startTime ? ` data-start="${srtTimeSec(v.startTime)}"` : ''}>
            <div class="verse-header">
              <span class="verse-name"><span style="color:#aaa;font-weight:normal;margin-left:0.4rem;">${verseIndex}.</span>${escHtml(v.verse)}</span>
              <span style="display:flex;gap:0.5rem;align-items:center;">
                ${v.subtitleNum ? `<span class="verse-label" style="font-size:0.8rem;">#${escHtml(String(v.subtitleNum))}</span>` : ''}
                ${v.startTime ? `<span class="verse-time">${escHtml(v.startTime)}</span>` : ''}
              </span>
            </div>
            ${v.srtExcerpt ? `<div class="verse-srt"><span class="verse-label">SRT:</span> &ldquo;${escHtml(v.srtExcerpt)}&rdquo;</div>` : ''}
            ${v.verseText ? `<div class="verse-original"><span class="verse-label">פסוק:</span> ${escHtml(v.verseText)}</div>` : ''}
          </div>`;
        }
      }
      if (data.claudeRaw) {
        html += `<div style="margin-top:1rem;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;">
          <div style="background:#f1f5f9;padding:0.6rem 1rem;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='block'?'none':'block';this.querySelector('.dbg-arrow').textContent=this.nextElementSibling.style.display==='block'?'▲':'▼'">
            <span style="font-size:0.85rem;color:#888;">תשובת קלוד הגולמית</span>
            <span class="dbg-arrow" style="font-size:0.75rem;color:#888;">▼</span>
          </div>
          <div style="display:none;padding:1rem;background:#f8fafc;">
            <textarea style="width:100%;min-height:200px;font-size:0.8rem;font-family:monospace;direction:ltr;resize:vertical;border:none;background:transparent;outline:none;" readonly>${escHtml(JSON.stringify(JSON.parse(data.claudeRaw), null, 2))}</textarea>
          </div>
        </div>`;
      }
      container.innerHTML = html;
      container.style.display = 'block';
      container.querySelectorAll('.verse-card[data-start], .topic-item[data-start]').forEach(el => {
        el.style.cursor = 'pointer';
        el.addEventListener('click', () => {
          const audio = document.getElementById('srtPlayer');
          audio.currentTime = parseFloat(el.dataset.start);
          audio.play();
        });
      });
      if (data.topics?.length) lastTopicsData = data.topics;
    }

    function parseSrt(srtText) {
      return srtText.trim().split(/\n\s*\n/).map(block => {
        const lines = block.trim().split('\n');
        if (lines.length < 3) return null;
        const times = lines[1].split(' --> ');
        if (times.length < 2) return null;
        return {
          id: parseInt(lines[0]),
          start: srtTimeSec(times[0].trim()),
          end: srtTimeSec(times[1].trim()),
          text: lines.slice(2).join('\n'),
        };
      }).filter(s => s && !isNaN(s.start));
    }

    function srtTimeSec(t) {
      const [hms, ms] = t.split(',');
      const [h, m, s] = hms.split(':').map(Number);
      return h * 3600 + m * 60 + s + (parseInt(ms || 0) / 1000);
    }

    function fmtSec(sec) {
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = Math.floor(sec % 60);
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function setupAudioPlayer(fileOrUrl) {
      const audio = document.getElementById('srtPlayer');
      if (audio._blobUrl) URL.revokeObjectURL(audio._blobUrl);
      if (typeof fileOrUrl === 'string') {
        audio._blobUrl = null;
        audio.src = fileOrUrl;
      } else {
        audio._blobUrl = URL.createObjectURL(fileOrUrl);
        audio.src = audio._blobUrl;
      }
      document.getElementById('stickyPlayer').style.display = 'block';
      document.body.style.paddingTop = '60px';
      audio.ontimeupdate = () => {
        const t = audio.currentTime;
        const verseCards = [...document.querySelectorAll('.verse-card[data-start]')];
        verseCards.forEach(c => c.classList.remove('active'));
        let activeVerse = null;
        for (const c of verseCards) {
          if (parseFloat(c.dataset.start) <= t) activeVerse = c;
        }
        if (activeVerse) {
          activeVerse.classList.add('active');
          activeVerse.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }
      };
    }

    function toggleUserView() {
      userViewActive = !userViewActive;
      document.querySelector('.card').style.display = userViewActive ? 'none' : '';
      document.getElementById('userView').style.display = userViewActive ? 'flex' : 'none';
      const fab = document.getElementById('viewToggleFab');
      fab.textContent = userViewActive ? '🛠️' : '📖';
      fab.title = userViewActive ? 'חזרה לתצוגת ניפוי' : 'תצוגת משתמש';
      document.getElementById('captionToggleBtn').style.display = userViewActive ? 'none' : 'flex';
      if (userViewActive) {
        renderUserView();
        updateUserViewPlayback();
        if (showMeter) startUvMeterLoop();
        startUvPauseWatchLoop();
        startUvScrollLoop();
      } else {
        stopUvMeterLoop();
        stopUvPauseWatchLoop();
        stopUvScrollLoop();
      }
    }

    function toggleCaptions() {
      captionsVisible = !captionsVisible;
      document.getElementById('userViewCaption').style.display = captionsVisible ? 'flex' : 'none';
      const btn = document.getElementById('captionToggleBtn');
      btn.classList.toggle('uv-off', !captionsVisible);
      btn.title = captionsVisible ? 'הסתר כתוביות' : 'הצג כתוביות';
    }

    function renderUserView() {
      uvVerses = lastVersesData
        .filter(v => !v.missing && v.verseText && v.startTime)
        .map(v => ({ text: v.verseText, sec: srtTimeSec(v.startTime + ',000'), verseNum: v.verseNum, chapterNum: v.chapterNum }));
      uvCurrentIdx = null;
      uvPauseHandledIdx = null;
      uvMeterRowIdx = null;
      uvChapterBadgeIdx = null;
      const track = document.getElementById('uvTrack');
      track.innerHTML = uvVerses.map((v, i) => `
        <div class="uv-row" data-idx="${i}">
          <span class="uv-num-badge">
            <span class="uv-chapter-num"></span>
            <span class="uv-verse-num">${v.verseNum != null ? numToHebrew(v.verseNum) : ''}</span>
          </span>
          <span class="uv-row-text">${escHtml(v.text)}</span>
          <span class="uv-row-spacer" aria-hidden="true"></span>
          <div class="uv-meter"><div class="uv-meter-fill"></div></div>
        </div>`).join('');
      uvRowEls = [...track.querySelectorAll('.uv-row')];
      uvRowChapterEls = uvRowEls.map(el => el.querySelector('.uv-chapter-num'));
      uvMeasureRows();
      uvPositionTrack();
    }

    function uvMeasureRows() {
      uvRowCenters = uvRowEls.map(el => el.offsetTop + el.offsetHeight / 2);
    }

    function uvComputeRowCenter() {
      const idx = (uvCurrentIdx === null || uvCurrentIdx < 0) ? 0 : uvCurrentIdx;
      return uvRowCenters[idx] != null ? uvRowCenters[idx] : 0;
    }

    const UV_ANCHOR_RATIO = 0.35; // חלק מגובה ה-viewport שבו "יושבת" השורה הפעילה (0.5 = מרכז מדויק)
    function uvPositionTrack() {
      if (!uvRowCenters.length) return;
      const track = document.getElementById('uvTrack');
      const viewport = document.getElementById('userViewVerses');
      const centerY = viewport.clientHeight * UV_ANCHOR_RATIO;
      track.style.transform = `translateY(${centerY - uvComputeRowCenter()}px)`;
    }

    let uvScrollRaf = null;
    function uvScrollTick() {
      uvMeasureRows();
      uvPositionTrack();
      uvScrollRaf = requestAnimationFrame(uvScrollTick);
    }
    function startUvScrollLoop() {
      if (uvScrollRaf !== null) return;
      uvScrollRaf = requestAnimationFrame(uvScrollTick);
    }
    function stopUvScrollLoop() {
      if (uvScrollRaf !== null) { cancelAnimationFrame(uvScrollRaf); uvScrollRaf = null; }
    }

    function uvSetChapterBadge(i, show) {
      const el = uvRowChapterEls[i];
      const v = uvVerses[i];
      if (!el) return;
      el.textContent = (show && v && v.chapterNum != null) ? numToHebrew(v.chapterNum) : '';
    }

    function uvApplyVisibleWindow(idx) {
      uvRowEls.forEach(el => el.classList.remove('uv-active'));
      const activeEl = idx !== null ? uvRowEls[idx] : undefined;
      if (activeEl) activeEl.classList.add('uv-active');

      const badgeIdx = idx === null ? null : Math.max(idx, 0);
      if (uvChapterBadgeIdx !== badgeIdx) {
        if (uvChapterBadgeIdx !== null) uvSetChapterBadge(uvChapterBadgeIdx, false);
        if (badgeIdx !== null) uvSetChapterBadge(badgeIdx, true);
        uvChapterBadgeIdx = badgeIdx;
      }

      const minVisibleIdx = (idx !== null ? idx : 0) - prevVersesCount;
      const maxVisibleIdx = (idx !== null ? idx : 0) + 1;
      uvRowEls.forEach((el, i) => {
        el.classList.toggle('uv-hidden-hist', i < minVisibleIdx || i > maxVisibleIdx);
      });
    }

    function renderUvActive() {
      uvApplyVisibleWindow(uvCurrentIdx);
      applyMeterVisibility();
    }

    let uvMeterRaf = null;
    function updateUvMeter() {
      if (uvMeterRowIdx === null) return;
      const row = uvRowEls[uvMeterRowIdx];
      if (!row) return;
      const fill = row.querySelector('.uv-meter-fill');
      const audio = document.getElementById('srtPlayer');
      // אין פסוק "נוכחי" לפני שהגיעו לפסוק הראשון (uvCurrentIdx === -1) - מודדים מתחילת ההשמעה עד הפסוק הראשון
      const cur = (uvCurrentIdx !== null && uvCurrentIdx >= 0) ? uvVerses[uvCurrentIdx] : null;
      const startSec = cur ? cur.sec : 0;
      const next = cur ? uvVerses[uvCurrentIdx + 1] : uvVerses[0];
      const endSec = next ? next.sec : (isFinite(audio.duration) ? audio.duration : null);
      if (endSec === null || endSec <= startSec) { fill.style.transform = 'scaleX(0)'; return; }
      const progress = Math.min(1, Math.max(0, (audio.currentTime - startSec) / (endSec - startSec)));
      fill.style.transform = `scaleX(${progress})`;
    }
    function startUvMeterLoop() {
      if (uvMeterRaf !== null) return;
      const tick = () => { updateUvMeter(); uvMeterRaf = requestAnimationFrame(tick); };
      uvMeterRaf = requestAnimationFrame(tick);
    }
    function stopUvMeterLoop() {
      if (uvMeterRaf !== null) { cancelAnimationFrame(uvMeterRaf); uvMeterRaf = null; }
      if (uvMeterRowIdx !== null && uvRowEls[uvMeterRowIdx]) {
        const fill = uvRowEls[uvMeterRowIdx].querySelector('.uv-meter-fill');
        if (fill) fill.style.transform = 'scaleX(0)';
      }
    }

    const UV_PAUSE_AFTER_VERSE_START_SEC = 0.3;
    let uvPauseWatchRaf = null;
    function uvPauseWatchTick() {
      if (pauseBeforeVerse && uvCurrentIdx !== null) {
        const audio = document.getElementById('srtPlayer');
        const cur = uvVerses[uvCurrentIdx];
        const pauseAt = cur ? cur.sec + UV_PAUSE_AFTER_VERSE_START_SEC : null;
        if (pauseAt !== null && !audio.paused && audio.currentTime >= pauseAt && uvPauseHandledIdx !== uvCurrentIdx) {
          audio.pause();
          audio.currentTime = pauseAt;
          uvPauseHandledIdx = uvCurrentIdx;
        }
      }
      uvPauseWatchRaf = requestAnimationFrame(uvPauseWatchTick);
    }
    function startUvPauseWatchLoop() {
      if (uvPauseWatchRaf !== null) return;
      uvPauseWatchRaf = requestAnimationFrame(uvPauseWatchTick);
    }
    function stopUvPauseWatchLoop() {
      if (uvPauseWatchRaf !== null) { cancelAnimationFrame(uvPauseWatchRaf); uvPauseWatchRaf = null; }
    }

    function uvSeekTo(idx) {
      const v = uvVerses[idx];
      if (!v) return;
      const audio = document.getElementById('srtPlayer');
      audio.pause();
      audio.currentTime = v.sec;
      uvCurrentIdx = idx;
      renderUvActive();
    }

    document.getElementById('uvTrack').addEventListener('click', (e) => {
      const row = e.target.closest('.uv-row');
      if (!row) return;
      const idx = parseInt(row.dataset.idx, 10);
      if (Number.isNaN(idx) || idx === uvCurrentIdx) return;
      uvSeekTo(idx);
    });

    function uvNavigate(direction) {
      if (uvGestureCooldown || uvCurrentIdx === null) return;
      const targetIdx = uvCurrentIdx + direction;
      if (!uvVerses[targetIdx]) return;
      uvGestureCooldown = true;
      uvSeekTo(targetIdx);
      setTimeout(() => { uvGestureCooldown = false; }, 500);
    }

    const userViewEl = document.getElementById('userView');
    userViewEl.addEventListener('wheel', (e) => {
      if (!userViewActive) return;
      e.preventDefault();
      uvNavigate(e.deltaY > 0 ? 1 : -1);
    }, { passive: false });

    userViewEl.addEventListener('touchstart', (e) => {
      if (!userViewActive) return;
      uvTouchStartY = e.touches[0].clientY;
    }, { passive: true });

    userViewEl.addEventListener('touchmove', (e) => {
      if (!userViewActive || uvTouchStartY === null) return;
      e.preventDefault();
    }, { passive: false });

    userViewEl.addEventListener('touchend', (e) => {
      if (!userViewActive || uvTouchStartY === null) return;
      const deltaY = uvTouchStartY - e.changedTouches[0].clientY;
      uvTouchStartY = null;
      const SWIPE_THRESHOLD = 40;
      if (Math.abs(deltaY) < SWIPE_THRESHOLD) return;
      uvNavigate(deltaY > 0 ? 1 : -1);
    });

    document.addEventListener('keydown', (e) => {
      if (!userViewActive) return;
      if (e.key === 'ArrowDown') { e.preventDefault(); uvNavigate(1); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); uvNavigate(-1); }
    });

    function updateUserViewPlayback() {
      if (!userViewActive) return;
      const audio = document.getElementById('srtPlayer');
      const t = audio.currentTime;

      const captionEl = document.getElementById('userViewCaption');
      const seg = srtSegments.find(s => t >= s.start && t < s.end);
      if (seg) {
        if (seg.id !== lastCaptionSegId) { captionEl.textContent = seg.text; lastCaptionSegId = seg.id; }
      } else if (lastCaptionSegId !== null) {
        captionEl.textContent = ''; lastCaptionSegId = null;
      }

      let idx = -1;
      for (let i = 0; i < uvVerses.length; i++) {
        if (uvVerses[i].sec <= t) idx = i; else break;
      }
      if (idx !== uvCurrentIdx) {
        uvCurrentIdx = idx;
        renderUvActive();
      }
    }

    document.getElementById('srtPlayer').addEventListener('timeupdate', updateUserViewPlayback);

    document.getElementById('manualSrtFileParallel').addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => { document.getElementById('manualSrtInputParallel').value = e.target.result; };
      reader.readAsText(file, 'utf-8');
    });

    document.getElementById('manualVersesFileParallel').addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => { document.getElementById('manualVersesInputParallel').value = e.target.result; };
      reader.readAsText(file, 'utf-8');
    });

    function toggleManualSrtParallel() {
      const area = document.getElementById('manualSrtAreaParallel');
      area.style.display = area.style.display === 'none' ? 'block' : 'none';
    }

    function toggleManualVersesParallel() {
      const area = document.getElementById('manualVersesAreaParallel');
      area.style.display = area.style.display === 'none' ? 'block' : 'none';
    }

    function updateCacheButtons() {
      const hasAll = Object.keys(localStorage).some(k => k.startsWith('verseMapping_') || k.startsWith('srtData_'));
      const hasCurrent = selectedAudioFile && (() => {
        const fk = `${selectedAudioFile.name}_${selectedAudioFile.size}`;
        return localStorage.getItem(`verseMapping_${fk}`) !== null || localStorage.getItem(`srtData_${fk}`) !== null;
      })();
      document.getElementById('btnClearCurrent').style.display = hasCurrent ? '' : 'none';
      document.getElementById('btnClearAll').style.display = hasAll ? '' : 'none';
    }

    function clearCurrentCache() {
      if (!selectedAudioFile) return;
      const fileKey = `${selectedAudioFile.name}_${selectedAudioFile.size}`;
      localStorage.removeItem(`verseMapping_${fileKey}`);
      localStorage.removeItem(`topicsMapping_${fileKey}`);
      localStorage.removeItem(`srtData_${fileKey}`);
      document.getElementById('manualVersesResultParallel').style.display = 'none';
      updateCacheButtons();
    }

    function clearAllCache() {
      Object.keys(localStorage)
        .filter(k => k.startsWith('verseMapping_') || k.startsWith('topicsMapping_') || k.startsWith('srtData_'))
        .forEach(k => localStorage.removeItem(k));
      document.getElementById('manualVersesResultParallel').style.display = 'none';
      updateCacheButtons();
    }

    function loadManualSrtParallel() {
      const srtText = document.getElementById('manualSrtInputParallel').value.trim();
      if (!srtText) { alert('הדבק SRT תחילה'); return; }
      lastData.srt = srtText;
      srtSegments = parseSrt(srtText);
      if (!srtSegments.length) { alert('לא זוהו segments ב-SRT'); return; }
      if (selectedAudioFile) {
        localStorage.setItem(`srtData_${selectedAudioFile.name}_${selectedAudioFile.size}`, srtText);
      }
      document.getElementById('manualSrtAreaParallel').style.display = 'none';
      if (lastVersesData.length) renderParallelVerses({ verses: lastVersesData });
    }

    async function findVersesManualParallel() {
      const text = document.getElementById('manualInputParallel').value.trim();
      if (!text) { alert('הדבק טקסט'); return; }
      const btn = document.getElementById('manualVersesBtnParallel');
      const result = document.getElementById('manualVersesResultParallel');
      const includeTopics = document.getElementById('includeTopicsManual').checked;
      btn.disabled = true; btn.textContent = 'מחפש...';
      result.style.display = 'none';
      try {
        const data = await callFindVerses(text, includeTopics);
        renderVerses(data, result);
      } catch (e) {
        result.textContent = 'שגיאת רשת: ' + e.message;
        result.style.display = 'block';
      } finally {
        btn.disabled = false; btn.textContent = 'זיהוי פסוקים ברצף';
      }
    }

    function loadManualVersesParallel() {
      const raw = document.getElementById('manualVersesInputParallel').value.trim();
      if (!raw) { alert('הדבק JSON או SRT תחילה'); return; }
      let data;
      if (raw.includes('-->')) {
        const segs = parseSrt(raw);
        if (!segs.length) { alert('לא זוהו ערכים ב-SRT'); return; }
        const verses = segs.map(s => ({
          verse: s.text,
          startTime: s.start != null ? new Date(s.start * 1000).toISOString().substr(11, 8) : undefined,
        }));
        data = { verses, complete: true };
      } else {
        try { data = JSON.parse(raw); } catch (e) { alert('JSON לא תקין: ' + e.message); return; }
        if (Array.isArray(data)) data = { verses: data, complete: true };
        if (!data.verses) { alert('לא נמצא שדה "verses" ב-JSON'); return; }
      }
      const container = document.getElementById('manualVersesResultParallel');
      renderVerses(data, container);
      if (selectedAudioFile && data.verses?.length) {
        const key = `verseMapping_${selectedAudioFile.name}_${selectedAudioFile.size}`;
        localStorage.setItem(key, JSON.stringify(data.verses));
        updateCacheButtons();
      }
      container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      document.getElementById('manualVersesAreaParallel').style.display = 'none';
    }

    async function callFindVerses(text, includeTopics = false) {
      const res = await fetch('/find-verses', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, includeTopics }),
      });
      return res.json();
    }

    async function findVersesParallel() {
      const text = lastData.srt || '';
      if (!text) { alert('אין SRT — תמלל קובץ או הדבק SRT תחילה'); return; }
      const btn = document.getElementById('parallelVersesBtn');
      const status = document.getElementById('parallelStatus');
      const includeTopics = document.getElementById('includeTopics').checked;
      btn.disabled = true; btn.textContent = 'מחפש...';
      status.textContent = '';
      try {
        const data = await callFindVerses(text, includeTopics);
        renderParallelVerses(data);
      } catch (e) {
        status.textContent = 'שגיאה: ' + e.message;
      } finally {
        btn.disabled = false; btn.textContent = 'זיהוי פסוקים';
      }
    }

    function renderParallelVerses(versesData) {
      const container = document.getElementById('parallelResult');
      if (versesData.error) {
        container.textContent = 'שגיאה: ' + versesData.error;
        container.style.display = 'block';
        return;
      }
      const { verses = [], complete } = versesData;
      if (verses.length) lastVersesData = verses;
      if (selectedAudioFile && verses.length) {
        localStorage.setItem(`verseMapping_${selectedAudioFile.name}_${selectedAudioFile.size}`, JSON.stringify(verses));
        if (versesData.topics?.length) {
          localStorage.setItem(`topicsMapping_${selectedAudioFile.name}_${selectedAudioFile.size}`, JSON.stringify(versesData.topics));
        }
        updateCacheButtons();
      }

      if (!srtSegments?.length) {
        container.textContent = 'אין נתוני SRT — תמלל קובץ או הדבק SRT תחילה';
        container.style.display = 'block';
        return;
      }

      const bySubtitle = {};
      for (const v of verses) {
        if (!v.missing && v.subtitleNum) bySubtitle[v.subtitleNum] = v;
      }
      const byTime = {};
      for (const v of verses) {
        if (!v.missing && !v.subtitleNum && v.startTime) {
          const sec = srtTimeSec(v.startTime + ',000');
          let closest = null, minDiff = Infinity;
          for (const s of srtSegments) {
            const diff = Math.abs(s.start - sec);
            if (diff < minDiff) { minDiff = diff; closest = s.id; }
          }
          if (closest !== null && minDiff < 5) byTime[closest] = v;
        }
      }

      if (versesData.topics?.length) lastTopicsData = versesData.topics;

      let html = `<div style="margin-bottom:0.75rem;font-size:0.9rem;color:#555;">${complete ? '✅ הרצף שלם' : '⚠️ יש חורים ברצף'}</div>`;

      if (versesData.topics?.length) {
        const hasTopicTimes = versesData.topics.some(t => t.startTime);
        html += `<div class="topics-toc">`;
        html += `<div class="topics-toc-title">📋 תוכן עניינים</div>`;
        for (let i = 0; i < versesData.topics.length; i++) {
          const t = versesData.topics[i];
          const sec = t.startTime ? srtTimeSec(t.startTime + ',000') : null;
          html += `<div class="topic-item"${sec !== null ? ` data-start="${sec}"` : ''}>`;
          html += `<span class="topic-item-title"><span style="color:#86efac;margin-left:0.4rem;">${i + 1}.</span>${escHtml(t.title)}</span>`;
          if (t.startTime) html += `<span class="topic-item-time">${escHtml(t.startTime)}</span>`;
          html += `</div>`;
        }
        if (hasTopicTimes) {
          html += `<div style="margin-top:0.5rem;text-align:left;"><button class="btn-download" style="background:#166534;" onclick="downloadTopicsSrt()">הורד SRT נושאים</button></div>`;
        }
        html += `</div>`;
      }

      const lastSegEnd = srtSegments.length ? srtSegments[srtSegments.length - 1].end : 0;
      const topicMarkers = (versesData.topics || [])
        .map((t, origIdx) => ({ t, origIdx }))
        .filter(({ t }) => t.startTime)
        .map(({ t, origIdx }) => ({ sec: srtTimeSec(t.startTime + ',000'), title: t.title, origIdx }))
        .sort((a, b) => a.sec - b.sec);
      for (let i = 0; i < topicMarkers.length; i++) {
        topicMarkers[i].endSec = i < topicMarkers.length - 1 ? topicMarkers[i + 1].sec : lastSegEnd;
      }
      let tmIdx = 0;

      html += `<div class="parallel-grid">`;
      for (const seg of srtSegments) {
        while (tmIdx < topicMarkers.length && topicMarkers[tmIdx].sec <= seg.start) {
          const tm = topicMarkers[tmIdx];
          html += `<div class="topic-divider" data-start="${tm.sec}" data-end="${tm.endSec}">`;
          html += `<span style="color:#86efac;margin-left:0.4rem;">${tm.origIdx + 1}.</span>${escHtml(tm.title)}`;
          html += `</div>`;
          tmIdx++;
        }
        const verse = bySubtitle[seg.id] ?? byTime[seg.id];
        html += `<div class="parallel-seg" data-start="${seg.start}" data-end="${seg.end}">`;
        html += `<span class="srt-time">${fmtSec(seg.start)}</span> ${escHtml(seg.text)}`;
        html += `</div>`;
        html += `<div class="parallel-verse-cell">`;
        if (verse) {
          const sec = verse.startTime ? srtTimeSec(verse.startTime + ',000') : null;
          html += `<div class="verse-card"${sec !== null ? ` data-start="${sec}"` : ''}>`;
          html += `<div class="verse-header">`;
          html += `<span class="verse-name">${escHtml(verse.verse)}</span>`;
          if (verse.startTime) html += `<span class="verse-time">${escHtml(verse.startTime)}</span>`;
          html += `</div>`;
          if (verse.verseText) html += `<div class="verse-original">${escHtml(verse.verseText)}</div>`;
          html += `</div>`;
        }
        html += `</div>`;
      }
      while (tmIdx < topicMarkers.length) {
        const tm = topicMarkers[tmIdx];
        html += `<div class="topic-divider" data-start="${tm.sec}" data-end="${tm.endSec}">`;
        html += `<span style="color:#86efac;margin-left:0.4rem;">${tm.origIdx + 1}.</span>${escHtml(tm.title)}`;
        html += `</div>`;
        tmIdx++;
      }
      html += `</div>`;

      container.innerHTML = html;
      container.style.display = 'block';

      container.querySelectorAll('.verse-card[data-start], .topic-item[data-start], .topic-divider[data-start]').forEach(el => {
        el.style.cursor = 'pointer';
        el.addEventListener('click', () => {
          const audio = document.getElementById('srtPlayer');
          audio.currentTime = parseFloat(el.dataset.start);
          audio.play();
        });
      });

      document.getElementById('srtPlayer').addEventListener('timeupdate', function () {
        const t = this.currentTime;
        container.querySelectorAll('.parallel-seg[data-start]').forEach(div => {
          const s = parseFloat(div.dataset.start), e = parseFloat(div.dataset.end);
          div.classList.toggle('active', t >= s && t < e);
        });
        container.querySelectorAll('.topic-divider[data-start]').forEach(div => {
          const s = parseFloat(div.dataset.start), e = parseFloat(div.dataset.end);
          div.classList.toggle('active', t >= s && t < e);
        });
      });

      document.getElementById('viewToggleFab').disabled = false;
    }

    async function transcribe() {
      const file = document.getElementById('audioFile').files[0] || selectedAudioFile;
      if (!file) { alert('בחר קובץ אודיו'); return; }

      const btn = document.getElementById('btn');
      const status = document.getElementById('status');

      btn.disabled = true;
      status.textContent = 'מעלה קובץ...';

      const form = new FormData();
      form.append('audio', file);

      try {
        const res = await fetch('/transcribe', { method: 'POST', body: form });
        const data = await res.json();
        if (!res.ok || data.error) {
          status.textContent = 'שגיאה: ' + JSON.stringify(data.error ?? data);
          return;
        }

        const { jobId } = data;
        status.textContent = 'מתמלל...';
        await pollStatus(jobId);
      } catch (e) {
        status.textContent = 'שגיאת רשת: ' + e.message;
      } finally {
        btn.disabled = false;
      }
    }

    async function pollStatus(jobId) {
      const status = document.getElementById('status');
      let dots = 0;

      while (true) {
        await new Promise(r => setTimeout(r, 3000));
        dots = (dots + 1) % 4;
        status.textContent = 'מתמלל' + '.'.repeat(dots + 1);

        try {
          const res = await fetch('/status/' + jobId);
          const data = await res.json();

          if (!res.ok || data.error) {
            status.textContent = 'שגיאה: ' + JSON.stringify(data.error ?? data);
            return;
          }

          if (data.status === 'COMPLETED') {
            lastData = data;
            if (data.srt) {
              srtSegments = parseSrt(data.srt);
              if (selectedAudioFile) {
                localStorage.setItem(`srtData_${selectedAudioFile.name}_${selectedAudioFile.size}`, data.srt);
                setupAudioPlayer(selectedAudioFile);
              }
            }
            status.textContent = '';
            return;
          }
        } catch (e) {
          status.textContent = 'שגיאת רשת: ' + e.message;
          return;
        }
      }
    }

    const lectureRouteMatch = location.pathname.match(/^\/lecture\/([a-zA-Z0-9_-]+)\/?$/);
    if (lectureRouteMatch) {
      bootstrapFromLecture(lectureRouteMatch[1]);
    } else {
      initFromCache();
    }
  </script>
</body>
</html>
